<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courtney — Training Tracker 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Instrument+Sans:wght@400;500&display=swap');
:root {
  --bg:#0F0F0F;--s1:#1A1A1A;--s2:#222;--s3:#2A2A2A;
  --border:rgba(255,255,255,0.07);--border-md:rgba(255,255,255,0.13);
  --text:#EDEAE4;--muted:#5A5754;--muted2:#888480;
  --run:#4ADE80;--run-bg:rgba(74,222,128,0.1);
  --gym:#60A5FA;--gym-bg:rgba(96,165,250,0.1);
  --hyrox:#FB923C;--hyrox-bg:rgba(251,146,60,0.1);
  --race:#E879F9;--race-bg:rgba(232,121,249,0.12);
  --amber:#FBBF24;--amber-bg:rgba(251,191,36,0.08);
  --pilates:#F472B6;--pilates-bg:rgba(244,114,182,0.1);
  --rest-bg:rgba(255,255,255,0.025);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.75rem 1rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.topbar-left h1{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:-0.02em;}
.topbar-left p{font-size:0.68rem;color:var(--muted2);letter-spacing:0.04em;text-transform:uppercase;margin-top:1px;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.btn{font-family:'Instrument Sans',sans-serif;font-size:0.72rem;font-weight:500;padding:6px 13px;border-radius:6px;border:1px solid var(--border-md);background:var(--s2);color:var(--muted2);cursor:pointer;transition:all 0.15s;}
.btn:hover{background:var(--s3);color:var(--text);}
.btn.primary{background:var(--hyrox-bg);border-color:rgba(251,146,60,0.3);color:var(--hyrox);}
.countdowns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:1rem 1.75rem;}
.countdown-card{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:12px 14px;text-align:center;}
.cd-days{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:700;line-height:1;}
.cd-label{font-size:0.63rem;color:var(--muted2);margin-top:3px;text-transform:uppercase;letter-spacing:0.05em;}
.cd-race{font-size:0.65rem;margin-top:5px;font-weight:500;}
.phase-tabs{display:flex;gap:3px;padding:1rem 1.75rem 0;overflow-x:auto;scrollbar-width:none;}
.phase-tabs::-webkit-scrollbar{display:none;}
.ptab{font-family:'Syne',sans-serif;font-size:0.65rem;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;padding:7px 14px;border-radius:6px 6px 0 0;border:1px solid transparent;border-bottom:none;cursor:pointer;white-space:nowrap;color:var(--muted);background:transparent;transition:all 0.15s;}
.ptab:hover{color:var(--muted2);}
.ptab.active{background:var(--s1);border-color:var(--border-md);color:var(--text);}
.content{padding:0 1.75rem 3rem;background:var(--s1);border-top:1px solid var(--border-md);}
.phase-panel{display:none;padding-top:1.25rem;}
.phase-panel.active{display:block;}
.phase-info{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.phase-info-left h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;letter-spacing:-0.01em;}
.phase-info-left p{font-size:0.72rem;color:var(--muted2);margin-top:3px;}
.phase-badges{display:flex;gap:6px;flex-wrap:wrap;}
.badge{font-size:0.62rem;padding:3px 9px;border-radius:20px;font-weight:500;border:1px solid;}
.week-block{margin-bottom:1.5rem;}
.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:pointer;user-select:none;}
.week-header-left{display:flex;align-items:center;gap:10px;}
.week-title{font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted2);}
.week-dates{font-size:0.65rem;color:var(--muted);}
.week-sessions{display:flex;flex-direction:column;gap:6px;}
.week-sessions.collapsed{display:none;}
.session-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color 0.15s;}
.session-card:hover{border-color:var(--border-md);}
.session-card.done{border-color:rgba(74,222,128,0.2);}
.session-top{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;}
.session-type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.session-title{font-size:0.78rem;font-weight:500;flex:1;}
.session-date{font-size:0.65rem;color:var(--muted2);}
.session-status{font-size:0.62rem;padding:2px 7px;border-radius:10px;font-weight:500;}
.session-status.done{background:rgba(74,222,128,0.12);color:var(--run);}
.session-status.pending{background:var(--rest-bg);color:var(--muted);}
.session-expand-btn{font-size:0.65rem;color:var(--muted);transition:transform 0.2s;padding:2px 4px;}
.session-expand-btn.open{transform:rotate(180deg);}
.session-detail{display:none;padding:0 12px 12px;border-top:1px solid var(--border);}
.session-detail.open{display:block;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.detail-grid.three{grid-template-columns:1fr 1fr 1fr;}
.field-group{display:flex;flex-direction:column;gap:4px;}
.field-label{font-size:0.6rem;color:var(--muted2);text-transform:uppercase;letter-spacing:0.05em;}
.field-input{background:var(--s3);border:1px solid var(--border);border-radius:5px;padding:6px 9px;font-size:0.75rem;color:var(--text);font-family:'Instrument Sans',sans-serif;width:100%;transition:border-color 0.15s;}
.field-input:focus{outline:none;border-color:var(--border-md);}
.field-input::placeholder{color:var(--muted);}
.exercises-section{margin-top:10px;}
.exercises-label{font-size:0.6rem;color:var(--muted2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;display:block;}
.exercise-row{display:grid;grid-template-columns:1fr 80px 80px 28px;gap:5px;margin-bottom:5px;align-items:center;}
.exercise-row input{background:var(--s3);border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-size:0.72rem;color:var(--text);font-family:'Instrument Sans',sans-serif;width:100%;}
.exercise-row input:focus{outline:none;border-color:var(--border-md);}
.exercise-row input::placeholder{color:var(--muted);font-size:0.68rem;}
.ex-del{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:0.8rem;padding:4px;border-radius:3px;transition:color 0.15s;}
.ex-del:hover{color:#f87171;}
.add-exercise-btn{font-size:0.68rem;color:var(--muted2);background:transparent;border:1px dashed var(--border-md);border-radius:5px;padding:5px 10px;cursor:pointer;width:100%;margin-top:4px;font-family:'Instrument Sans',sans-serif;transition:all 0.15s;}
.add-exercise-btn:hover{color:var(--text);border-color:var(--muted);}
.notes-area{width:100%;background:var(--s3);border:1px solid var(--border);border-radius:5px;padding:7px 9px;font-size:0.73rem;color:var(--text);font-family:'Instrument Sans',sans-serif;resize:vertical;min-height:80px;margin-top:8px;}
.notes-area:focus{outline:none;border-color:var(--border-md);}
.session-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.save-btn{font-family:'Instrument Sans',sans-serif;font-size:0.7rem;font-weight:500;padding:6px 14px;border-radius:5px;border:1px solid rgba(74,222,128,0.3);background:rgba(74,222,128,0.08);color:var(--run);cursor:pointer;transition:all 0.15s;}
.save-btn:hover{background:rgba(74,222,128,0.15);}
.mark-done-btn{font-family:'Instrument Sans',sans-serif;font-size:0.7rem;padding:6px 14px;border-radius:5px;border:1px solid var(--border);background:var(--s3);color:var(--muted2);cursor:pointer;transition:all 0.15s;}
.mark-done-btn.undo{border-color:rgba(74,222,128,0.2);color:var(--run);background:rgba(74,222,128,0.06);}
.fuel-box{margin-top:8px;background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.18);border-radius:5px;padding:7px 10px;font-size:0.7rem;color:#b8880a;line-height:1.55;}
.fuel-box strong{display:block;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;color:#a07508;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--s1);border:1px solid var(--border-md);border-radius:12px;padding:1.5rem;width:420px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal h3{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:1rem;}
.modal-field{margin-bottom:12px;}
.modal-field label{font-size:0.65rem;color:var(--muted2);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:4px;}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;background:var(--s3);border:1px solid var(--border-md);border-radius:5px;padding:7px 10px;font-size:0.75rem;color:var(--text);font-family:'Instrument Sans',sans-serif;}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{outline:none;}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end;}
.runs-log{padding:1.25rem 0;}
.runs-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.runs-header h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;}
.run-stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem;}
.run-stat{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.run-stat-val{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;color:var(--run);line-height:1;}
.run-stat-label{font-size:0.6rem;color:var(--muted2);margin-top:4px;text-transform:uppercase;letter-spacing:0.05em;}
.run-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden;}
.run-card-top{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;}
.run-dot{width:8px;height:8px;border-radius:50%;background:var(--run);flex-shrink:0;}
.run-name{font-size:0.78rem;font-weight:500;flex:1;}
.run-meta{display:flex;gap:10px;align-items:center;}
.run-chip{font-size:0.62rem;background:var(--run-bg);color:var(--run);padding:2px 7px;border-radius:10px;font-weight:500;}
.run-date-lbl{font-size:0.63rem;color:var(--muted2);}
.run-expand{font-size:0.65rem;color:var(--muted);transition:transform 0.2s;}
.run-expand.open{transform:rotate(180deg);}
.run-detail{display:none;padding:0 12px 12px;border-top:1px solid var(--border);}
.run-detail.open{display:block;}
.run-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0 8px;}
.run-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.feel-btns{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
.feel-btn{font-size:0.65rem;padding:4px 10px;border-radius:20px;border:1px solid var(--border-md);background:transparent;color:var(--muted2);cursor:pointer;font-family:'Instrument Sans',sans-serif;transition:all 0.15s;}
.feel-btn.selected{border-color:var(--run);background:var(--run-bg);color:var(--run);}
.run-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.empty-runs{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:0.8rem;}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--s2);border:1px solid rgba(74,222,128,0.3);color:var(--run);font-size:0.75rem;padding:9px 16px;border-radius:8px;z-index:300;opacity:0;transform:translateY(8px);transition:all 0.25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.5);cursor:pointer;}
select option{background:#1E1E1E;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>Courtney's Training Tracker</h1>
    <p>Hyrox Aug 23 · Perth Half Oct 12</p>
  </div>
  <div class="topbar-right">
    <button class="btn" onclick="exportData()">⬇ Export</button>
    <button class="btn" onclick="document.getElementById('importFile').click()">⬆ Import</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn" onclick="openAddSession()">+ Add session</button>
    <button class="btn primary" onclick="openReviewModal()">4-week review</button>
  </div>
</div>

<div class="countdowns" id="countdowns"></div>
<div class="phase-tabs" id="phaseTabs"></div>
<div class="content" id="mainContent"></div>

<!-- ADD SESSION MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>Add session</h3>
    <div class="modal-field"><label>Date</label><input type="date" id="newDate"></div>
    <div class="modal-field"><label>Type</label>
      <select id="newType">
        <option value="gym">Gym / Strength</option>
        <option value="run">Run</option>
        <option value="hyrox">Hyrox sim</option>
        <option value="pilates">Pilates (optional)</option>
        <option value="rest">Rest / Recovery</option>
      </select>
    </div>
    <div class="modal-field"><label>Name</label><input type="text" id="newName" placeholder="e.g. Lower strength + Sled"></div>
    <div class="modal-field"><label>Notes / plan</label><textarea id="newNotes" rows="3" placeholder="What's the plan?"></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAddModal()">Cancel</button>
      <button class="btn primary" onclick="saveNewSession()">Add</button>
    </div>
  </div>
</div>

<!-- REVIEW MODAL -->
<div class="modal-overlay" id="reviewModal">
  <div class="modal">
    <h3>4-week review</h3>
    <div class="modal-field"><label>What went well?</label><textarea id="reviewWell" rows="2"></textarea></div>
    <div class="modal-field"><label>What needs work?</label><textarea id="reviewImprove" rows="2"></textarea></div>
    <div class="modal-field"><label>Adjust weights / targets for next block?</label><textarea id="reviewAdjust" rows="2"></textarea></div>
    <div class="modal-field"><label>How is the body feeling?</label>
      <select id="reviewFeeling">
        <option value="">Select...</option>
        <option>Fresh — ready to push harder</option>
        <option>Good — maintain current load</option>
        <option>Tired — need to back off slightly</option>
        <option>Beat up — deload week needed</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeReviewModal()">Cancel</button>
      <button class="btn primary" onclick="saveReview()">Save review</button>
    </div>
  </div>
</div>

<!-- LOG RUN MODAL -->
<div class="modal-overlay" id="logRunModal">
  <div class="modal">
    <h3>Log a run</h3>
    <div class="modal-field"><label>Date</label><input type="date" id="runDate"></div>
    <div class="modal-field"><label>Run name / type</label><input type="text" id="runName" placeholder="e.g. Easy zone 2, Runna tempo, Parkrun..."></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div class="modal-field"><label>Distance (km)</label><input type="text" id="runDist" placeholder="5.2"></div>
      <div class="modal-field"><label>Time</label><input type="text" id="runTime" placeholder="32:14"></div>
      <div class="modal-field"><label>Avg pace /km</label><input type="text" id="runPace" placeholder="6:11"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="modal-field"><label>Avg HR (bpm)</label><input type="text" id="runHR" placeholder="155"></div>
      <div class="modal-field"><label>Elevation (m)</label><input type="text" id="runElev" placeholder="42"></div>
    </div>
    <div class="modal-field"><label>Route / location</label><input type="text" id="runRoute" placeholder="Where did you run?"></div>
    <div class="modal-field"><label>Fuelling used</label><input type="text" id="runFuel" placeholder="e.g. 1 gel at 45 min, water only..."></div>
    <div class="modal-field"><label>How did it feel?</label>
      <div class="feel-btns" id="feelBtns">
        <button class="feel-btn" onclick="selectFeel(this,'😴 Dead legs')">😴 Dead legs</button>
        <button class="feel-btn" onclick="selectFeel(this,'😐 Average')">😐 Average</button>
        <button class="feel-btn" onclick="selectFeel(this,'🙂 Good')">🙂 Good</button>
        <button class="feel-btn" onclick="selectFeel(this,'💪 Strong')">💪 Strong</button>
        <button class="feel-btn" onclick="selectFeel(this,'🔥 Flew')">🔥 Flew</button>
      </div>
    </div>
    <div class="modal-field"><label>Notes</label><textarea id="runNotes" rows="2" placeholder="How breathing felt, conditions, what Runna said..."></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeLogRun()">Cancel</button>
      <button class="btn" style="background:var(--run-bg);border-color:rgba(74,222,128,0.3);color:var(--run)" onclick="saveRun()">Save run</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STRETCH PROTOCOLS ─────────────────────────────────────────────────────
const STRETCH = {
  squat_strength: `STRETCH PROTOCOL (10-12 min):
· Hip flexor lunge stretch 45s each side (squats + hip thrust load hip flexors)
· Pigeon pose 45s each side (glutes from hip thrust + squat depth)
· Standing hamstring stretch — foot elevated on bench 45s each side
· Wall calf stretch — straight leg 30s each side (calf raises)
· Lat stretch — arm overhead lean 30s each side (lat pulldown)
· Child's pose with arms extended 45s (decompress spine after loaded squats)
· Knees to chest lying down 30s

RIGHT KNEE CARE:
· IT band stretch — cross right leg behind left, lean left 60s
· TFL release — lie on side, foam roller at hip/glute junction 60s right side
· Lateral quad stretch — outside of right quad 60s
· Figure 4 seated stretch 60s right side
· Kneecap mobility — gently move side to side + up/down 30s`,

  sled_strength: `STRETCH PROTOCOL (10-12 min):
· Hip flexor lunge stretch 45s each side (sled push + step ups)
· Wall calf stretch — straight + bent knee 30s each side (sled push hammers calves)
· Quad stretch 30s each side
· Doorway chest stretch 30s (bench press)
· Shoulder cross-body stretch 30s each side
· Child's pose with arms extended 45s (lower back from sled lean)
· Knees to chest lying down 30s

RIGHT KNEE CARE:
· IT band stretch — cross right leg behind left, lean left 60s
· TFL release — foam roller at hip/glute junction 60s right side
· Lateral quad stretch — outside of right quad 60s
· Figure 4 seated stretch 60s right side
· Kneecap mobility 30s`,

  lunge_strength: `STRETCH PROTOCOL (10-12 min):
· Hip flexor lunge stretch 45s each side (walking lunges + squats)
· Standing hamstring stretch — foot elevated 45s each side
· Pigeon pose 45s each side (lunges load glutes deeply)
· Wall calf stretch 30s each side
· Lat stretch — arm overhead lean 30s each side (chin ups)
· Child's pose with arms extended 45s
· Knees to chest lying down 30s

RIGHT KNEE CARE:
· IT band stretch — cross right leg behind left, lean left 60s
· TFL release — foam roller at hip/glute junction 60s right side
· Lateral quad stretch — outside of right quad 60s
· Figure 4 seated stretch 60s right side
· Kneecap mobility 30s`,

  lunge_row_bench: `STRETCH PROTOCOL (10-12 min):
· Hip flexor lunge stretch 45s each side (Bulgarian lunges load hip flexors heavily)
· Pigeon pose 45s each side (deep glute stretch after Bulgarian lunges)
· Standing hamstring stretch 45s each side
· Doorway chest stretch 30s (bench press)
· Tricep overhead stretch 30s each side (dips)
· Lat stretch — arm overhead lean 30s each side (bent over row)
· Child's pose with arms extended 45s
· Knees to chest lying down 30s

RIGHT KNEE CARE:
· IT band stretch — cross right leg behind left, lean left 60s
· TFL release — foam roller at hip/glute junction 60s right side
· Lateral quad stretch — outside of right quad 60s
· Figure 4 seated stretch 60s right side
· Kneecap mobility 30s`,

  sled_pull_deadlift: `STRETCH PROTOCOL (10-12 min):
· Hip flexor lunge stretch 45s each side (sled pull + deadlift hip hinge)
· Standing hamstring stretch 45s each side (sumo deadlift)
· Wide leg forward fold 45s (sumo stance opens inner thighs)
· Lat stretch — arm overhead lean 30s each side (lat pulldown + sled pull)
· Shoulder cross-body stretch 30s each side (shoulder press)
· Child's pose with arms extended 45s (lower back from deadlift)
· Knees to chest lying down 30s

RIGHT KNEE CARE:
· IT band stretch — cross right leg behind left, lean left 60s
· TFL release — foam roller at hip/glute junction 60s right side
· Lateral quad stretch — outside of right quad 60s
· Figure 4 seated stretch 60s right side
· Kneecap mobility 30s`,

  deadlift_thruster: `STRETCH PROTOCOL (10-12 min):
· Standing hamstring stretch 45s each side (sumo deadlift)
· Wide leg forward fold 45s (sumo stance)
· Hip flexor lunge stretch 45s each side (thrusters + deadlift)
· Shoulder cross-body stretch 30s each side (thrusters overhead)
· Tricep overhead stretch 30s each side (dips)
· Lat stretch 30s each side (single arm DB row)
· Child's pose with arms extended 45s
· Knees to chest lying down 30s

RIGHT KNEE CARE:
· IT band stretch — cross right leg behind left, lean left 60s
· TFL release — foam roller at hip/glute junction 60s right side
· Lateral quad stretch — outside of right quad 60s
· Figure 4 seated stretch 60s right side
· Kneecap mobility 30s`,

  sled_push_press: `STRETCH PROTOCOL (10-12 min):
· Hip flexor lunge stretch 45s each side (sled pull hip drive)
· Wall calf stretch 30s each side
· Standing hamstring stretch 45s each side (sumo deadlift)

function buildNotes(warmup, session, stretch, fuel, isRun, isStrength, isRest, isHyrox) {
  let n = '';
  if (warmup) {
    n += 'WARM UP:\n' + warmup;
    if (isRun || isHyrox) n += '\n\n' + KNEE_ACTIVATION;
  }
  if (session) n += (n ? '\n\n' : '') + 'SESSION:\n' + session;
  if (isStrength) n += '\n\n' + KNEE_FORM;
  if (isRest) n += '\n\n' + FOAM_ROLL;
  if (stretch) n += '\n\nWARM DOWN:\n5 min bike/walk + stretch\n\n' + STRETCH[stretch];
  return n.trim();
}

const SB_HDR = { 'Content-Type':'application/json', 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Prefer':'return=minimal' };

async function sbGet(table, id) {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, { headers:{...SB_HDR,'Prefer':''} });
    const rows = await res.json();
    return rows.length ? JSON.parse(rows[0].data) : null;
  } catch(e) { return null; }
}

async function sbSet(table, id, data) {
  try {
    await fetch(`${SB_URL}/rest/v1/${table}`, { method:'POST', headers:{...SB_HDR,'Prefer':'resolution=merge-duplicates'}, body:JSON.stringify({id, data:JSON.stringify(data)}) });
  } catch(e) { console.error('sbSet failed:', e); }
}

  ]);

// ── INIT — sessions always from file, personal data from Supabase ─────────
function init() {
  sessions = JSON.parse(JSON.stringify(DEFAULT_SESSIONS));
  renderCountdowns();
  renderTabs();
  renderActivePhase(); // show immediately from file
  loadCloud();         // then merge personal data in background
}

async function loadCloud() {
  const [savedRuns, savedReviews, savedPersonal] = await Promise.all([
    sbGet('runs',     'courtney'),
    sbGet('reviews',  'courtney'),
    sbGet('personal', 'courtney'),
  ]);
  if (savedRuns)      runs     = savedRuns;
  if (savedReviews)   reviews  = savedReviews;
  if (savedPersonal)  personal = savedPersonal;
  // Merge personal overrides into sessions
  sessions = sessions.map(s => {
    const o = personal[s.id];
    if (!o) return s;
    return { ...s,
      done:      o.done      !== undefined ? o.done      : s.done,
      notes:     o.notes     !== undefined ? o.notes     : s.notes,
      duration:  o.duration  !== undefined ? o.duration  : s.duration,
      hr:        o.hr        !== undefined ? o.hr        : s.hr,
      exercises: o.exercises !== undefined ? o.exercises : s.exercises,
    };
  });
  renderActivePhase();
}

function renderCountdowns() {
  const now = new Date();
  document.getElementById('countdowns').innerHTML = RACES.map(r => {
    const diff = Math.ceil((new Date(r.date) - now) / 86400000);
    const gone = diff < 0;
    return `<div class="countdown-card">
      <div class="cd-days" style="color:${r.color}">${gone ? '✓' : diff}</div>
      <div class="cd-label">${gone ? 'completed' : 'days to go'}</div>
      <div class="cd-race" style="color:${r.color}">${r.label}</div>
    </div>`;
  }).join('');
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────
function renderActivePhase() {
  const phase = PHASES.find(p => p.id === activePhase);
  if (!phase) return;
  const phaseSessions = sessions.filter(s => s.date >= phase.start && s.date <= phase.end).sort((a,b) => a.date.localeCompare(b.date));

  const weeks = {};
  phaseSessions.forEach(s => {
    const d = new Date(s.date);
    const mon = getMonday(d);
    const key = mon.toISOString().slice(0,10);
    if (!weeks[key]) weeks[key] = [];
    weeks[key].push(s);
  });

  const badgeHTML = [phase.badge, phase.badge2, phase.badge3].filter(Boolean)
    .map(b => `<span class="badge" style="color:${phase.color};border-color:${phase.color}22;background:${phase.color}11">${b}</span>`).join('');

  let html = `<div class="phase-info">
    <div class="phase-info-left"><h2>${phase.name}</h2><p>${phase.dates}</p></div>
    <div class="phase-badges">${badgeHTML}</div>
  </div>`;

  const weekKeys = Object.keys(weeks).sort();
  if (weekKeys.length === 0) {
    html += `<p style="color:var(--muted);font-size:0.8rem;padding:2rem 0">No sessions in this phase yet.</p>`;
  }

  weekKeys.forEach((wk, wi) => {
    const wkDate = new Date(wk);
    const wkEnd = new Date(wk); wkEnd.setDate(wkEnd.getDate() + 6);
    const wkSessions = weeks[wk];
    const doneCount = wkSessions.filter(s => s.done).length;
    const isOpen = openCards[`wk-${wk}`] !== false;
    html += `<div class="week-block">
      <div class="week-header" onclick="toggleWeek('${wk}')">
        <div class="week-header-left">
          <span class="week-title">Week ${wi+1}</span>
          <span class="week-dates">${fmt(wkDate)} – ${fmt(wkEnd)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:0.62rem;color:var(--muted2)">${doneCount}/${wkSessions.length} done</span>
          <span style="font-size:0.65rem;color:var(--muted);transition:transform 0.2s;${isOpen?'transform:rotate(90deg)':''}">▶</span>
        </div>
      </div>
      <div class="week-sessions ${isOpen?'':'collapsed'}" id="ws-${wk}">
        ${wkSessions.map(s => renderSessionCard(s)).join('')}
      </div>
    </div>`;
  });

  document.getElementById('mainContent').innerHTML = html;
}

function renderSessionCard(s) {
  const m = TYPE_META[s.type] || TYPE_META.rest;
  const isOpen = openCards[s.id];
  const isDone = s.done;
  const weightMemory = personal['_weights'] || {};
  const distMemory   = personal['_distances'] || {};

  const exRows = (s.exercises || []).map((ex, i) => {
    const exKey = (ex.name||'').trim().toLowerCase();

    // Detect if this exercise is a run (show distance instead of weight)
    const isRun = /\brun\b|\brunning\b/i.test(ex.name||'');

    // Detect if time-based (has "min" in reps)
    const isTimeBased = /\d+\s*min/i.test(ex.reps||'');

    // Distance column — for runs and time-based exercises
    const needsDist    = isRun || isTimeBased;
    const savedDist    = personal[s.id]?.distances?.[i] || '';
    const lastDist     = distMemory[exKey];
    const isManualDist = !!(personal[s.id]?.manualDists?.[i]);
    const isAutoDist   = savedDist && !isManualDist;
    const showDistHint = lastDist && !savedDist;
    const distColor    = isAutoDist ? '#FBBF24' : (savedDist ? '#4ADE80' : 'var(--text)');
    const distBorder   = isAutoDist ? 'rgba(251,191,36,0.3)' : showDistHint ? 'rgba(251,146,60,0.4)' : 'var(--border)';
    const distPlaceholder = isRun ? (showDistHint ? '↑ '+lastDist : 'km') : (showDistHint ? '↑ '+lastDist : 'dist (m)');

    // Weight column — only for non-run exercises
    const savedWeight    = personal[s.id]?.weights?.[i] || ex.weight || '';
    const lastWeight     = weightMemory[exKey];
    const isManualWeight = !!(personal[s.id]?.manualWeights?.[i]);
    const isAutoWeight   = savedWeight && !isManualWeight;
    const showWtHint     = lastWeight && !savedWeight && exKey;
    const weightColor    = isAutoWeight ? '#FBBF24' : (savedWeight ? '#4ADE80' : 'var(--text)');
    const weightBorder   = isAutoWeight ? 'rgba(251,191,36,0.3)' : showWtHint ? 'rgba(251,191,36,0.4)' : 'var(--border)';

    const iStyle = (color, border) => `background:var(--s3);border:1px solid ${border};border-radius:4px;padding:5px 8px;font-size:0.72rem;color:${color};font-family:'Instrument Sans',sans-serif;width:100%;`;

    const distField = needsDist ? `<input value="${savedDist}" placeholder="${distPlaceholder}" oninput="updateDist('${s.id}',${i},'${exKey}',this.value)" style="${iStyle(distColor,distBorder)}font-weight:${savedDist?'500':'400'};" title="${isRun?'Distance run (km)':'Distance covered in this time'}">` : '';

    const weightField = !isRun ? `<input value="${savedWeight}" placeholder="${showWtHint?'↑ '+lastWeight:'kg'}" oninput="updateWeight('${s.id}',${i},'${exKey}',this.value)" style="${iStyle(weightColor,weightBorder)}font-weight:${savedWeight?'500':'400'};" title="Weight used">` : '';

    // Grid: exercise | sets | reps | [weight or dist] | [dist if time-based non-run] | del
    const extraCols = isRun ? ' 65px' : needsDist ? ' 65px 65px' : ' 65px';
    const cols = `1fr 45px 55px${extraCols} 28px`;

    return `<div style="display:grid;grid-template-columns:${cols};gap:4px;margin-bottom:5px;align-items:center;">
      <input value="${ex.name||''}" placeholder="Exercise" onchange="updateEx('${s.id}',${i},'name',this.value)" style="${iStyle('var(--text)','var(--border)')}">
      <input value="${ex.sets||''}" placeholder="Sets" onchange="updateEx('${s.id}',${i},'sets',this.value)" style="${iStyle('var(--text)','var(--border)')}">
      <input value="${ex.reps||''}" placeholder="Reps" onchange="updateEx('${s.id}',${i},'reps',this.value)" style="${iStyle('var(--text)','var(--border)')}">
      ${weightField}
      ${distField}
      <button class="ex-del" onclick="delEx('${s.id}',${i})">✕</button>
    </div>`;
  }).join('');

  // Column headers — show weight and/or dist depending on session content
  const hasRun      = (s.exercises||[]).some(ex => /\brun\b|\brunning\b/i.test(ex.name||''));
  const hasTimeBased= (s.exercises||[]).some(ex => /\d+\s*min/i.test(ex.reps||''));
  const hasNonRun   = (s.exercises||[]).some(ex => !/\brun\b|\brunning\b/i.test(ex.name||''));
  const showWtCol   = hasNonRun;
  const showDistCol = hasRun || hasTimeBased;
  const cols = `1fr 45px 55px${showWtCol?' 65px':''}${showDistCol?' 65px':''} 28px`;
  const exHeader = `
    <div style="display:flex;gap:12px;margin-bottom:5px;">
      <span style="font-size:0.58rem;color:#FBBF24">■ auto-filled</span>
      <span style="font-size:0.58rem;color:#4ADE80">■ entered this session</span>
    </div>
    <div style="display:grid;grid-template-columns:${cols};gap:4px;margin-bottom:4px;">
      <span style="font-size:0.58rem;color:var(--muted);padding-left:4px">Exercise</span>
      <span style="font-size:0.58rem;color:var(--muted)">Sets</span>
      <span style="font-size:0.58rem;color:var(--muted)">Reps</span>
      ${showWtCol?'<span style="font-size:0.58rem;color:var(--amber)">Weight</span>':''}
      ${showDistCol?'<span style="font-size:0.58rem;color:var(--hyrox)">Dist 📈</span>':''}
      <span></span>
    </div>`;

  const fuelDisplay = s.fuel ? `<div class="fuel-box"><strong>⚡ Fuelling</strong>${s.fuel.replace(/[💧🍌⚡🏁🍝🥗]/g,'').trim()}</div>` : '';

  // Parse stretch items from notes — lines starting with ·
  const stretchTicks = personal[s.id]?.stretchTicks || {};
  const notes = s.notes || '';
  const lines = notes.split('\n');
  let inStretch = false;
  let stretchItems = [];
  let mainNotes = [];
  lines.forEach(line => {
    if (line.includes('STRETCH PROTOCOL') || line.includes('RIGHT KNEE CARE') || line.includes('FOAM ROLL PROTOCOL')) {
      inStretch = true;
    }
    if (inStretch && line.trim().startsWith('·')) {
      stretchItems.push(line.trim().slice(1).trim());
    } else if (!inStretch) {
      mainNotes.push(line);
    }
  });

  const stretchHTML = stretchItems.length > 0 ? `
    <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">
      <div style="font-size:0.6rem;color:var(--muted2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
        <span>🧘 Stretch + Roll Protocol</span>
        <button onclick="clearStretches('${s.id}')" style="font-size:0.58rem;background:transparent;border:none;color:var(--muted);cursor:pointer;padding:2px 6px;border-radius:3px">reset</button>
      </div>
      ${stretchItems.map((item, i) => {
        const key = `${s.id}_str_${i}`;
        const checked = stretchTicks[i] || false;
        return `<div style="display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
          <input type="checkbox" id="${key}" ${checked?'checked':''} onchange="toggleStretch('${s.id}',${i},this.checked)" style="margin-top:2px;accent-color:var(--run);flex-shrink:0;cursor:pointer">
          <label for="${key}" style="font-size:0.72rem;color:${checked?'var(--muted)':'var(--text)'};cursor:pointer;text-decoration:${checked?'line-through':'none'};line-height:1.4">${item}</label>
        </div>`;
      }).join('')}
    </div>` : '';

  return `<div class="session-card ${isDone?'done':''}" id="card-${s.id}">
    <div class="session-top" onclick="toggleCard('${s.id}')">
      <div class="session-type-dot" style="background:${m.color}"></div>
      <div class="session-title">${s.name}</div>
      <div class="session-date">${fmtFull(new Date(s.date))}</div>
      <span class="session-status ${isDone?'done':'pending'}">${isDone?'✓ done':'pending'}</span>
      <span class="session-expand-btn ${isOpen?'open':''}">▾</span>
    </div>
    <div class="session-detail ${isOpen?'open':''}" id="detail-${s.id}">
      <div class="detail-grid three">
        <div class="field-group"><label class="field-label">Date</label><input class="field-input" type="date" value="${s.date}" onchange="updateField('${s.id}','date',this.value)"></div>
        <div class="field-group"><label class="field-label">Duration</label><input class="field-input" type="text" value="${s.duration||''}" placeholder="e.g. 55 min" onchange="updateField('${s.id}','duration',this.value)"></div>
        <div class="field-group"><label class="field-label">Avg HR / RPE</label><input class="field-input" type="text" value="${s.hr||''}" placeholder="e.g. 158bpm / RPE 7" onchange="updateField('${s.id}','hr',this.value)"></div>
      </div>
      <div class="exercises-section">
        <span class="exercises-label">Exercises — sets · reps / weight</span>
        <div style="display:flex;gap:12px;margin-bottom:6px">
          <span style="font-size:0.58rem;color:#FBBF24">■ auto-filled from last session</span>
          <span style="font-size:0.58rem;color:#4ADE80">■ entered this session</span>
        </div>
        ${exHeader}
        <div id="exlist-${s.id}">${exRows}</div>
        <button class="add-exercise-btn" onclick="addEx('${s.id}')">+ add exercise</button>
      </div>
      <textarea class="notes-area" placeholder="Session notes, how it felt, PBs, adjustments..." onchange="updateField('${s.id}','notes',this.value)">${s.notes||''}</textarea>
      ${fuelDisplay}
      ${stretchHTML}
      <div class="session-actions">
        <button class="save-btn" onclick="saveCard('${s.id}')">Save</button>
        <button class="mark-done-btn ${isDone?'undo':''}" onclick="toggleDone('${s.id}')">${isDone?'Mark undone':'Mark done'}</button>
        <button class="btn" style="margin-left:auto;font-size:0.68rem;color:#f87171;border-color:rgba(248,113,113,0.2);background:rgba(248,113,113,0.05)" onclick="deleteSession('${s.id}')">Delete</button>
      </div>
    </div>
  </div>`;
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────
function toggleCard(id) { openCards[id] = !openCards[id]; renderActivePhase(); }
function toggleWeek(wk) { openCards[`wk-${wk}`] = openCards[`wk-${wk}`] === false ? true : false; renderActivePhase(); }

function updateField(id, field, val) {
  const s = sessions.find(x => x.id === id);
  if (s) {
    s[field] = val;
    if (!personal[id]) personal[id] = {};
    personal[id][field] = val;
    save();
  }
}

function updateEx(id, idx, field, val) {
  const s = sessions.find(x => x.id === id);
  if (s && s.exercises[idx]) {
    s.exercises[idx][field] = val;
    if (!personal[id]) personal[id] = {};
    personal[id].exercises = JSON.parse(JSON.stringify(s.exercises));

    // If updating reps/weight field, save to exercise weight memory
    if (field === 'reps' && val.trim()) {
      const exName = s.exercises[idx].name.trim().toLowerCase();
      if (exName) {
        if (!personal['_weights']) personal['_weights'] = {};
        personal['_weights'][exName] = val.trim();
        // Pre-fill same exercise in future sessions that haven't been touched yet
        sessions.forEach(futureSession => {
          if (futureSession.date > s.date) {
            futureSession.exercises && futureSession.exercises.forEach((ex, i) => {
              if (ex.name.trim().toLowerCase() === exName) {
                // Only pre-fill if this exercise hasn't been manually set in personal data
                const fp = personal[futureSession.id];
                const alreadySet = fp && fp.exercises && fp.exercises[i] && fp.exercises[i].reps && fp.exercises[i].reps !== ex.reps;
                if (!alreadySet) {
                  ex.reps = val.trim();
                  if (!personal[futureSession.id]) personal[futureSession.id] = {};
                  if (!personal[futureSession.id].exercises) personal[futureSession.id].exercises = JSON.parse(JSON.stringify(futureSession.exercises));
                  personal[futureSession.id].exercises[i].reps = val.trim();
                }
              }
            });
          }
        });
      }
    }
    save();
  }
}

function addEx(id) {
  const s = sessions.find(x => x.id === id);
  if (s) {
    if (!s.exercises) s.exercises = [];
    s.exercises.push({name:'',sets:'',reps:''});
    if (!personal[id]) personal[id] = {};
    personal[id].exercises = JSON.parse(JSON.stringify(s.exercises));
    save(); renderActivePhase();
  }
}

function delEx(id, idx) {
  const s = sessions.find(x => x.id === id);
  if (s) {
    s.exercises.splice(idx, 1);
    if (!personal[id]) personal[id] = {};
    personal[id].exercises = JSON.parse(JSON.stringify(s.exercises));
    save(); renderActivePhase();
  }
}

function saveCard(id) { save(); showToast('Session saved ✓'); }

function updateWeight(id, idx, exKey, val) {
  const s = sessions.find(x => x.id === id);
  if (!s) return;
  if (!personal[id]) personal[id] = {};
  if (!personal[id].weights) personal[id].weights = {};
  if (!personal[id].manualWeights) personal[id].manualWeights = {};
  personal[id].weights[idx] = val.trim();
  personal[id].manualWeights[idx] = true;

  // Immediately turn green on the input element
  const inputEl = document.querySelector(`[oninput="updateWeight('${id}',${idx},'${exKey}',this.value)"]`);
  if (inputEl) {
    inputEl.style.color = val.trim() ? '#4ADE80' : 'var(--text)';
    inputEl.style.borderColor = val.trim() ? 'var(--border)' : 'var(--border)';
  }

  if (val.trim() && exKey) {
    if (!personal['_weights']) personal['_weights'] = {};
    personal['_weights'][exKey] = val.trim();
    sessions.forEach(future => {
      if (future.date > s.date) {
        (future.exercises||[]).forEach((ex, i) => {
          if (ex.name.trim().toLowerCase() === exKey) {
            const fp = personal[future.id];
            const alreadySet = fp && fp.weights && fp.weights[i];
            if (!alreadySet) {
              if (!personal[future.id]) personal[future.id] = {};
              if (!personal[future.id].weights) personal[future.id].weights = {};
              personal[future.id].weights[i] = val.trim();
            }
          }
        });
      }
    });
  }
  save();
}

function updateDist(id, idx, exKey, val) {
  const s = sessions.find(x => x.id === id);
  if (!s) return;
  if (!personal[id]) personal[id] = {};
  if (!personal[id].distances) personal[id].distances = {};
  if (!personal[id].manualDists) personal[id].manualDists = {};
  personal[id].distances[idx] = val.trim();
  personal[id].manualDists[idx] = true;

  // Immediately turn green on the input element
  const inputEl = document.querySelector(`[oninput="updateDist('${id}',${idx},'${exKey}',this.value)"]`);
  if (inputEl) {
    inputEl.style.color = val.trim() ? '#4ADE80' : 'var(--text)';
  }

  if (val.trim() && exKey) {
    if (!personal['_distances']) personal['_distances'] = {};
    personal['_distances'][exKey] = val.trim();
    sessions.forEach(futureSession => {
      if (futureSession.date > s.date) {
        (futureSession.exercises||[]).forEach((ex, i) => {
          if (ex.name.trim().toLowerCase() === exKey) {
            const fp = personal[futureSession.id];
            const alreadySet = fp && fp.distances && fp.distances[i];
            if (!alreadySet) {
              if (!personal[futureSession.id]) personal[futureSession.id] = {};
              if (!personal[futureSession.id].distances) personal[futureSession.id].distances = {};
              personal[futureSession.id].distances[i] = val.trim();
            }
          }
        });
      }
    });
  }
  save();
  showToast('Distance saved ✓');
}

function toggleStretch(id, idx, checked) {
  if (!personal[id]) personal[id] = {};
  if (!personal[id].stretchTicks) personal[id].stretchTicks = {};
  personal[id].stretchTicks[idx] = checked;
  save();
  // Update label style without full re-render
  const label = document.querySelector(`label[for="${id}_str_${idx}"]`);
  if (label) { label.style.color = checked ? 'var(--muted)' : 'var(--text)'; label.style.textDecoration = checked ? 'line-through' : 'none'; }
}

function clearStretches(id) {
  if (personal[id]) { personal[id].stretchTicks = {}; save(); renderActivePhase(); }
}

function toggleDone(id) {
  const s = sessions.find(x => x.id === id);
  if (s) {
    s.done = !s.done;
    if (!personal[id]) personal[id] = {};
    personal[id].done = s.done;
    save(); renderActivePhase();
  }
}

function deleteSession(id) { if (!confirm('Delete this session?')) return; sessions = sessions.filter(x => x.id !== id); save(); renderActivePhase(); }

function openAddSession() { document.getElementById('newDate').value = new Date().toISOString().slice(0,10); document.getElementById('newName').value = ''; document.getElementById('newNotes').value = ''; document.getElementById('addModal').classList.add('open'); }
function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }
function saveNewSession() {
  const date = document.getElementById('newDate').value;
  const type = document.getElementById('newType').value;
  const name = document.getElementById('newName').value.trim() || 'New session';
  const notes = document.getElementById('newNotes').value.trim();
  sessions.push({id:'u'+Date.now(), date, type, name, notes, exercises:[], done:false});
  save(); closeAddModal();
  const phase = PHASES.find(p => date >= p.start && date <= p.end);
  if (phase) { activePhase = phase.id; renderTabs(); }
  renderActivePhase(); showToast('Session added ✓');
}

function openReviewModal() { document.getElementById('reviewModal').classList.add('open'); }
function closeReviewModal() { document.getElementById('reviewModal').classList.remove('open'); }
function saveReview() {
  reviews.push({phase:activePhase, date:new Date().toISOString().slice(0,10), well:document.getElementById('reviewWell').value, improve:document.getElementById('reviewImprove').value, adjust:document.getElementById('reviewAdjust').value, feeling:document.getElementById('reviewFeeling').value});
  save(); closeReviewModal(); renderActivePhase(); showToast('Review saved ✓');
}

// ── RUNS LOG ──────────────────────────────────────────────────────────────
function renderRunsLog() {
  const totalKm = runs.reduce((a,r) => a + (parseFloat(r.dist)||0), 0);
  const longestRun = runs.reduce((a,r) => Math.max(a, parseFloat(r.dist)||0), 0);
  const lastPace = runs.filter(r => r.pace).slice(-1)[0]?.pace || '—';
  const sorted = [...runs].sort((a,b) => b.date.localeCompare(a.date));

  const runCards = sorted.length === 0
    ? `<div class="empty-runs"><span>🏃</span>No runs logged yet — tap "+ Log a run" to add your first one.</div>`
    : sorted.map(r => {
        const isOpen = openCards['run-'+r.id];
        return `<div class="run-card">
          <div class="run-card-top" onclick="toggleRunCard('${r.id}')">
            <div class="run-dot"></div>
            <div class="run-name">${r.name||'Run'}</div>
            <div class="run-meta">
              ${r.dist?`<span class="run-chip">${r.dist}km</span>`:''}
              ${r.time?`<span class="run-chip" style="background:rgba(96,165,250,0.1);color:var(--gym)">${r.time}</span>`:''}
              ${r.feel?`<span style="font-size:0.72rem">${r.feel.split(' ')[0]}</span>`:''}
              <span class="run-date-lbl">${fmtFull(new Date(r.date))}</span>
            </div>
            <span class="run-expand ${isOpen?'open':''}">▾</span>
          </div>
          <div class="run-detail ${isOpen?'open':''}">
            <div class="run-grid">
              <div class="field-group"><label class="field-label">Distance (km)</label><input class="field-input" value="${r.dist||''}" placeholder="km" onchange="updateRun('${r.id}','dist',this.value)"></div>
              <div class="field-group"><label class="field-label">Time</label><input class="field-input" value="${r.time||''}" placeholder="mm:ss" onchange="updateRun('${r.id}','time',this.value)"></div>
              <div class="field-group"><label class="field-label">Avg pace /km</label><input class="field-input" value="${r.pace||''}" placeholder="m:ss" onchange="updateRun('${r.id}','pace',this.value)"></div>
            </div>
            <div class="run-grid-2">
              <div class="field-group"><label class="field-label">Avg HR (bpm)</label><input class="field-input" value="${r.hr||''}" placeholder="bpm" onchange="updateRun('${r.id}','hr',this.value)"></div>
              <div class="field-group"><label class="field-label">Elevation (m)</label><input class="field-input" value="${r.elev||''}" placeholder="m" onchange="updateRun('${r.id}','elev',this.value)"></div>
            </div>
            <div class="field-group" style="margin-bottom:8px"><label class="field-label">Route / location</label><input class="field-input" value="${r.route||''}" placeholder="Where did you run?" onchange="updateRun('${r.id}','route',this.value)"></div>
            <div class="field-group" style="margin-bottom:8px"><label class="field-label">Fuelling used</label><input class="field-input" value="${r.fuel||''}" placeholder="e.g. 1 gel at 45 min..." onchange="updateRun('${r.id}','fuel',this.value)"></div>
            <div class="field-group" style="margin-bottom:8px"><label class="field-label">How did it feel?</label>
              <div class="feel-btns">
                ${['😴 Dead legs','😐 Average','🙂 Good','💪 Strong','🔥 Flew'].map(f =>
                  `<button class="feel-btn ${r.feel===f?'selected':''}" onclick="updateRunFeel('${r.id}','${f}',this)">${f}</button>`
                ).join('')}
              </div>
            </div>
            <textarea class="notes-area" placeholder="Notes..." onchange="updateRun('${r.id}','notes',this.value)">${r.notes||''}</textarea>
            <div class="run-actions">
              <button class="save-btn" onclick="saveRun2('${r.id}')">Save</button>
              <button class="btn" style="margin-left:auto;font-size:0.68rem;color:#f87171;border-color:rgba(248,113,113,0.2);background:rgba(248,113,113,0.05)" onclick="deleteRun('${r.id}')">Delete</button>
            </div>
          </div>
        </div>`;
      }).join('');

  document.getElementById('mainContent').innerHTML = `<div class="runs-log">
    <div class="runs-header">
      <div><h2>Runs log</h2><p style="font-size:0.72rem;color:var(--muted2);margin-top:3px">All your runs — Runna sessions, easy runs, races</p></div>
      <button class="btn" style="background:var(--run-bg);border-color:rgba(74,222,128,0.3);color:var(--run)" onclick="openLogRun()">+ Log a run</button>
    </div>
    <div class="run-stats-row">
      <div class="run-stat"><div class="run-stat-val">${runs.length}</div><div class="run-stat-label">Total runs</div></div>
      <div class="run-stat"><div class="run-stat-val">${totalKm.toFixed(1)}</div><div class="run-stat-label">Total km</div></div>
      <div class="run-stat"><div class="run-stat-val">${longestRun>0?longestRun.toFixed(1):'—'}</div><div class="run-stat-label">Longest (km)</div></div>
      <div class="run-stat"><div class="run-stat-val" style="font-size:1rem">${lastPace}</div><div class="run-stat-label">Last pace /km</div></div>
    </div>
    ${runCards}
  </div>`;
}

function toggleRunCard(id) { openCards['run-'+id] = !openCards['run-'+id]; renderRunsLog(); }
function updateRun(id, field, val) { const r = runs.find(x => x.id === id); if (r) { r[field] = val; save(); } }
function updateRunFeel(id, feel, btn) { const r = runs.find(x => x.id === id); if (r) { r.feel = feel; save(); } btn.closest('.feel-btns').querySelectorAll('.feel-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); }
function saveRun2(id) { save(); showToast('Run saved ✓'); }
function deleteRun(id) { if (!confirm('Delete this run?')) return; runs = runs.filter(x => x.id !== id); save(); renderRunsLog(); }

function openLogRun() {
  selectedFeel = '';
  document.getElementById('runDate').value = new Date().toISOString().slice(0,10);
  ['runName','runDist','runTime','runPace','runHR','runElev','runRoute','runNotes','runFuel'].forEach(id => document.getElementById(id).value = '');
  document.querySelectorAll('#feelBtns .feel-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('logRunModal').classList.add('open');
}
function closeLogRun() { document.getElementById('logRunModal').classList.remove('open'); }
function selectFeel(btn, feel) { selectedFeel = feel; document.querySelectorAll('#feelBtns .feel-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); }
function saveRun() {
  const date = document.getElementById('runDate').value;
  if (!date) { alert('Please add a date'); return; }
  runs.push({id:'r'+Date.now(), date, name:document.getElementById('runName').value.trim()||'Run', dist:document.getElementById('runDist').value.trim(), time:document.getElementById('runTime').value.trim(), pace:document.getElementById('runPace').value.trim(), hr:document.getElementById('runHR').value.trim(), elev:document.getElementById('runElev').value.trim(), route:document.getElementById('runRoute').value.trim(), fuel:document.getElementById('runFuel').value.trim(), feel:selectedFeel, notes:document.getElementById('runNotes').value.trim()});
  save(); closeLogRun(); renderRunsLog(); showToast('Run logged ✓');
}

// ── EXPORT / IMPORT ───────────────────────────────────────────────────────
function exportData() {
  const data = {version:2, exportedAt:new Date().toISOString(), personal, reviews, runs};
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'courtney-training-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Data exported ✓');
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.runs) { alert('Invalid backup file.'); return; }
      if (!confirm('Import backup? This will replace your current data.')) return;
      personal  = data.personal  || {};
      reviews   = data.reviews   || [];
      runs      = data.runs      || [];
      sessions  = JSON.parse(JSON.stringify(DEFAULT_SESSIONS)).map(s => {
        const o = personal[s.id];
        if (o) return {...s, ...o};
        return s;
      });
      save(); renderTabs(); renderActivePhase(); showToast('Data restored ✓');
    } catch { alert('Could not read backup file.'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function getMonday(d) { const day = d.getDay(); const diff = d.getDate() - day + (day === 0 ? -6 : 1); return new Date(d.setDate(diff)); }
function fmt(d) { return d.toLocaleDateString('en-AU', {day:'numeric',month:'short'}); }
function fmtFull(d) { return d.toLocaleDateString('en-AU', {weekday:'short',day:'numeric',month:'short'}); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

init();
</script>
</body>
</html>
